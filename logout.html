<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex,nofollow" />
    <title>HR Lounge Logout</title>
    <style>
      :root {
        color-scheme: dark;
        --ink: #f7efe7;
        --muted: rgba(247, 239, 231, 0.72);
        --line: rgba(247, 239, 231, 0.2);
        --panel: rgba(18, 21, 23, 0.64);
        --accent: #ffb000;
        --accent-strong: #ff6b35;
        --deep: #121517;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
      }

      body {
        display: grid;
        min-height: 100vh;
        padding: clamp(24px, 4vw, 56px);
        color: var(--ink);
        background:
          linear-gradient(90deg, rgba(10, 12, 13, 0.88), rgba(10, 12, 13, 0.46) 52%, rgba(10, 12, 13, 0.82)),
          url("./assets/auth-access-bg.jpg") center / cover no-repeat,
          var(--deep);
        font-family:
          "Pretendard",
          "Apple SD Gothic Neo",
          "Noto Sans KR",
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        isolation: isolate;
      }

      body::before {
        position: fixed;
        inset: 0;
        z-index: -1;
        content: "";
        background:
          linear-gradient(120deg, rgba(255, 176, 0, 0.18), transparent 38%),
          repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.055) 0 1px, transparent 1px 84px);
        mix-blend-mode: screen;
        opacity: 0.58;
      }

      .logout-shell {
        display: grid;
        width: min(520px, 100%);
        margin: auto;
        padding: 32px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: 0 28px 80px rgba(0, 0, 0, 0.42);
        backdrop-filter: blur(18px);
      }

      .brand-mark {
        display: inline-flex;
        align-items: center;
        max-width: 100%;
        gap: 14px;
        min-height: 42px;
        color: var(--ink);
        font-size: 0.82rem;
        font-weight: 900;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .brand-mark span {
        min-width: 0;
        line-height: 1.16;
        overflow-wrap: anywhere;
      }

      .brand-mark img {
        width: 132px;
        height: auto;
        filter: brightness(0) invert(1);
      }

      .eyebrow {
        margin: 28px 0 10px;
        color: var(--accent);
        font-size: 0.76rem;
        font-weight: 900;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        max-width: 100%;
        font-size: clamp(1.48rem, 7.5vw, 3.7rem);
        font-weight: 950;
        line-height: 1.08;
        letter-spacing: 0;
        overflow-wrap: anywhere;
        word-break: keep-all;
      }

      p {
        margin: 18px 0 0;
        color: var(--muted);
        font-size: 1rem;
        font-weight: 700;
        line-height: 1.65;
        word-break: keep-all;
      }

      .status {
        min-height: 24px;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 24px;
      }

      .primary-link,
      .ghost-link {
        display: inline-flex;
        min-height: 44px;
        align-items: center;
        justify-content: center;
        padding: 0 16px;
        border-radius: 999px;
        font-size: 0.94rem;
        font-weight: 900;
        text-decoration: none;
      }

      .primary-link {
        color: #211b13;
        background: linear-gradient(90deg, var(--accent), var(--accent-strong));
      }

      .ghost-link {
        color: var(--ink);
        border: 1px solid rgba(247, 239, 231, 0.24);
        background: rgba(255, 255, 255, 0.07);
      }

      @media (max-width: 640px) {
        body {
          min-height: 100svh;
          padding: 20px;
        }

        .logout-shell {
          padding: 22px;
        }

        .brand-mark {
          flex-direction: column;
          align-items: flex-start;
          gap: 8px;
          font-size: 0.72rem;
          letter-spacing: 0.14em;
        }

        .brand-mark img {
          width: 126px;
        }

        h1 {
          font-size: clamp(1.36rem, 7.3vw, 2.1rem);
        }
      }
    </style>
  </head>
  <body>
    <main class="logout-shell" aria-labelledby="logout-title">
      <a class="brand-mark" href="/login.html" aria-label="Solmedix HR Lounge">
        <img src="./assets/solmedix-logo.png" alt="Solmedix" />
        <span>Secure HR Lounge</span>
      </a>
      <p class="eyebrow">Session closed</p>
      <h1 id="logout-title">로그아웃 중입니다</h1>
      <p class="status" id="logout-status" role="status">현재 브라우저의 HR Lounge 접속 세션을 정리하고 있습니다.</p>
      <div class="actions">
        <a class="primary-link" href="./login.html">다시 로그인</a>
        <a class="ghost-link" href="https://www.google.com/accounts/Logout">Google 계정 로그아웃</a>
      </div>
    </main>

    <script>
      const statusEl = document.querySelector("#logout-status");
      const titleEl = document.querySelector("#logout-title");

      async function logout() {
        try {
          const response = await fetch("/api/auth", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ action: "logout" }),
          });
          if (!response.ok) {
            throw new Error("Logout request failed");
          }
          titleEl.textContent = "로그아웃되었습니다";
          statusEl.textContent = "HR Lounge 세션이 종료되었습니다. 다시 접속하려면 회사 계정 또는 승인된 계정으로 로그인해 주세요.";
        } catch (error) {
          titleEl.textContent = "로그아웃 확인 필요";
          statusEl.textContent = "세션 종료 요청을 완료하지 못했습니다. 다시 로그인 화면으로 이동한 뒤 새로고침해 주세요.";
        }
      }

      logout();
    </script>
  </body>
</html>
