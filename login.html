<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex,nofollow" />
    <title>HR Lounge Secure Access</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
      :root {
        color-scheme: dark;
        --ink: #f7efe7;
        --muted: rgba(247, 239, 231, 0.72);
        --line: rgba(247, 239, 231, 0.2);
        --panel: rgba(18, 21, 23, 0.64);
        --accent: #ffb000;
        --accent-strong: #ff6b35;
        --deep: #121517;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
      }

      body {
        overflow: hidden;
        font-family:
          "Pretendard",
          "Apple SD Gothic Neo",
          "Noto Sans KR",
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        color: var(--ink);
        background: var(--deep);
      }

      .auth-page {
        position: relative;
        display: grid;
        min-height: 100vh;
        padding: clamp(24px, 4vw, 56px);
        isolation: isolate;
      }

      .auth-page::before {
        position: absolute;
        inset: 0;
        z-index: -3;
        content: "";
        background:
          linear-gradient(90deg, rgba(10, 12, 13, 0.9), rgba(10, 12, 13, 0.44) 48%, rgba(10, 12, 13, 0.76)),
          url("./assets/auth-access-bg.jpg") center / cover no-repeat;
        transform: scale(1.03);
      }

      .auth-page::after {
        position: absolute;
        inset: 0;
        z-index: -2;
        content: "";
        background:
          linear-gradient(120deg, rgba(255, 176, 0, 0.22), transparent 38%),
          repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.06) 0 1px, transparent 1px 84px);
        mix-blend-mode: screen;
        opacity: 0.62;
      }

      .auth-shell {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(320px, 420px);
        gap: clamp(28px, 6vw, 92px);
        align-items: center;
        width: min(1180px, 100%);
        margin: auto;
      }

      .brand-mark {
        display: inline-flex;
        align-items: center;
        max-width: 100%;
        gap: 14px;
        min-height: 42px;
        color: var(--ink);
        font-size: 0.82rem;
        font-weight: 900;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .brand-mark span {
        min-width: 0;
        line-height: 1.16;
        overflow-wrap: anywhere;
      }

      .brand-mark img {
        width: 132px;
        height: auto;
        filter: brightness(0) invert(1);
      }

      .headline {
        max-width: 740px;
      }

      .headline-kicker {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin: 0 0 18px;
        color: rgba(255, 213, 128, 0.94);
        font-size: 0.84rem;
        font-weight: 900;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .headline-kicker::before {
        width: 42px;
        height: 2px;
        content: "";
        background: currentColor;
      }

      h1 {
        max-width: 780px;
        margin: 0;
        font-size: clamp(4.1rem, 12vw, 9.7rem);
        font-weight: 950;
        line-height: 0.82;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      h1 span {
        display: block;
      }

      .auth-panel {
        width: 100%;
        padding: 30px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: 0 28px 80px rgba(0, 0, 0, 0.42);
        backdrop-filter: blur(18px);
      }

      .panel-label {
        margin: 0 0 10px;
        color: var(--accent);
        font-size: 0.74rem;
        font-weight: 900;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .auth-panel h2 {
        margin: 0;
        font-size: 1.64rem;
        line-height: 1.22;
        word-break: keep-all;
      }

      .auth-panel p {
        margin: 14px 0 0;
        color: var(--muted);
        line-height: 1.58;
        word-break: keep-all;
      }

      .domain-pill {
        display: inline-flex;
        align-items: center;
        min-height: 34px;
        margin-top: 20px;
        padding: 0 14px;
        border: 1px solid rgba(255, 176, 0, 0.42);
        border-radius: 999px;
        color: #ffe2a7;
        font-size: 0.88rem;
        font-weight: 850;
        background: rgba(255, 176, 0, 0.1);
      }

      .google-slot {
        display: inline-grid;
        place-items: stretch;
        width: min(100%, 312px);
        height: 52px;
        min-height: 52px;
        margin-top: 24px;
        padding: 3px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 8px;
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.025)),
          rgba(8, 10, 11, 0.12);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.12),
          0 10px 24px rgba(0, 0, 0, 0.2);
        overflow: visible;
      }

      .google-slot > div {
        display: block;
        width: 100% !important;
        height: 44px !important;
        overflow: visible !important;
      }

      .google-slot iframe {
        display: block;
        width: 100% !important;
        height: 44px !important;
        max-width: 100% !important;
      }

      .google-slot iframe {
        border-radius: 6px;
      }

      .auth-status {
        display: none;
        margin-top: 18px;
        color: rgba(247, 239, 231, 0.74);
        font-size: 0.92rem;
        line-height: 1.5;
      }

      .auth-status.is-visible {
        display: block;
      }

      .auth-status.is-error {
        color: #ffb7a8;
      }

      .signal-strip {
        position: absolute;
        right: clamp(20px, 4vw, 56px);
        bottom: clamp(20px, 4vw, 48px);
        display: flex;
        gap: 8px;
        align-items: center;
        color: rgba(247, 239, 231, 0.54);
        font-size: 0.74rem;
        font-weight: 900;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .signal-strip span {
        width: 34px;
        height: 3px;
        background: linear-gradient(90deg, var(--accent), var(--accent-strong));
      }

      @media (max-width: 860px) {
        body {
          overflow: auto;
        }

        .auth-page {
          min-height: 100svh;
          padding: 20px;
        }

        .auth-shell {
          grid-template-columns: 1fr;
          gap: 34px;
          align-content: center;
        }

        .brand-mark {
          flex-direction: column;
          align-items: flex-start;
          gap: 8px;
          font-size: 0.72rem;
          letter-spacing: 0.14em;
        }

        .brand-mark img {
          width: 126px;
        }

        h1 {
          font-size: clamp(3.7rem, 18vw, 6.2rem);
        }

        .auth-panel {
          padding: 18px;
        }

        .auth-panel h2 {
          font-size: clamp(1.38rem, 6vw, 1.56rem);
        }

        .signal-strip {
          position: static;
          margin-top: 28px;
        }
      }
    </style>
  </head>
  <body>
    <main class="auth-page">
      <section class="auth-shell" aria-label="HR Lounge 보안 로그인">
        <div class="headline">
          <a class="brand-mark" href="/login.html" aria-label="Solmedix HR Lounge">
            <img src="./assets/solmedix-logo.png" alt="Solmedix" />
            <span>Secure HR Lounge</span>
          </a>
          <p class="headline-kicker">Workspace verified</p>
          <h1>
            <span>People</span>
            <span>Inside</span>
          </h1>
        </div>

        <section class="auth-panel" aria-labelledby="auth-title">
          <p class="panel-label">Company Access</p>
          <h2 id="auth-title">Solmedix 계정으로 계속</h2>
          <span class="domain-pill" id="domain-pill">@solmedix.com only</span>
          <div class="google-slot" id="google-button" aria-label="Google 로그인 버튼"></div>
          <p class="auth-status" id="auth-status" role="status" aria-live="polite"></p>
        </section>
      </section>
      <div class="signal-strip" aria-hidden="true"><span></span>HR Lounge</div>
    </main>

    <script>
      const authStatus = document.querySelector("#auth-status");
      const googleButton = document.querySelector("#google-button");
      const domainPill = document.querySelector("#domain-pill");
      let authConfig = null;

      function setStatus(message, isError = false) {
        authStatus.textContent = message;
        authStatus.classList.toggle("is-visible", Boolean(message) && Boolean(isError));
        authStatus.classList.toggle("is-error", Boolean(isError));
      }

      function getNextUrl() {
        const params = new URLSearchParams(window.location.search);
        const next = params.get("next") || "/";
        if (window.location.hash && !next.includes("#")) {
          return `${next}${window.location.hash}`;
        }
        return next;
      }

      async function postAuth(payload) {
        const response = await fetch("/api/auth", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const result = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(result.error || "로그인에 실패했습니다.");
        }
        return result;
      }

      async function handleCredentialResponse(response) {
        if (!response || !response.credential) {
          setStatus("Google 로그인 응답이 없습니다. 다시 시도해 주세요.", true);
          return;
        }

        try {
          setStatus("회사 계정 여부를 확인하고 있습니다.");
          await postAuth({ action: "login", credential: response.credential });
          setStatus("확인되었습니다. HR Lounge로 이동합니다.");
          window.location.replace(getNextUrl());
        } catch (error) {
          setStatus(error.message || "회사 계정 확인에 실패했습니다.", true);
          if (window.google?.accounts?.id) {
            window.google.accounts.id.disableAutoSelect();
          }
        }
      }

      function initializeGoogle() {
        if (!window.google?.accounts?.id || !authConfig?.clientId) {
          window.setTimeout(initializeGoogle, 120);
          return;
        }

        window.google.accounts.id.initialize({
          client_id: authConfig.clientId,
          callback: handleCredentialResponse,
          auto_select: true,
          button_auto_select: true,
          use_fedcm_for_prompt: true,
          use_fedcm_for_button: true,
          cancel_on_tap_outside: false,
          context: "signin",
          hd: authConfig.allowedDomain,
        });

        const googleButtonWidth = Math.max(
          200,
          Math.min(306, Math.floor((googleButton.clientWidth || 312) - 6)),
        );

        window.google.accounts.id.renderButton(googleButton, {
          type: "standard",
          theme: "outline",
          size: "large",
          shape: "pill",
          text: "continue_with",
          logo_alignment: "left",
          width: googleButtonWidth,
        });

        window.google.accounts.id.prompt();
      }

      async function loadAuthConfig() {
        try {
          const response = await fetch("/api/auth", { cache: "no-store" });
          authConfig = await response.json();
          if (authConfig.authenticated) {
            window.location.replace(getNextUrl());
            return;
          }
          const domain = authConfig.allowedDomain || "solmedix.com";
          domainPill.textContent = `@${domain} only`;
          if (!authConfig.configured || !authConfig.clientId) {
            setStatus("Vercel 환경변수 HR_LOUNGE_GOOGLE_CLIENT_ID 설정이 필요합니다.", true);
            return;
          }
          initializeGoogle();
        } catch (error) {
          setStatus("로그인 설정을 불러오지 못했습니다. 잠시 후 다시 시도해 주세요.", true);
        }
      }

      loadAuthConfig();
    </script>
  </body>
</html>
